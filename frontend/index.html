<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Floor Control Room | AI Maintenance Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .glass-card {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
        }
        .status-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .critical-pulse {
            animation: pulse-ring-crit 1.5s infinite;
        }
        @keyframes pulse-ring-crit {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .gradient-text {
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .neon-border-red { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .neon-border-green { border-color: #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .neon-border-yellow { border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        // Custom Machine Card Component
        const MachineCard = ({ machine }) => {
            const getColor = (status) => {
                if (status === 'Healthy') return 'text-green-400 border-green-500 bg-green-500/10';
                if (status === 'Warning') return 'text-yellow-400 border-yellow-500 bg-yellow-500/10';
                return 'text-red-400 border-red-500 bg-red-500/10';
            };

            const isCritical = machine.status === 'Critical';

            return (
                <div className={`glass-card p-6 flex flex-col gap-4 ${isCritical ? 'neon-border-red' : ''}`}>
                    <div className="flex justify-between items-start">
                        <div>
                            <h3 className="header-font text-xl font-bold text-gray-100 flex items-center gap-2">
                                <span className="text-blue-400">#</span>{machine.machine_id}
                                {isCritical && <span className="flex h-2 w-2 rounded-full bg-red-500 critical-pulse"></span>}
                            </h3>
                            <span className={`text-xs px-2 py-0.5 rounded-full border ${getColor(machine.status)} mt-2 inline-block`}>
                                {machine.status.toUpperCase()}
                            </span>
                        </div>
                        <div className="text-right">
                            <div className="text-3xl font-bold header-font">{machine.health_score}%</div>
                            <div className="text-[10px] text-gray-500 uppercase tracking-wider">Health Stability</div>
                        </div>
                    </div>

                    {/* Chart Container */}
                    <div className="h-32 w-full mt-2">
                        <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={machine.history}>
                                <defs>
                                    <linearGradient id={`colorTemp-${machine.machine_id}`} x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#58a6ff" stopOpacity={0.3}/>
                                        <stop offset="95%" stopColor="#58a6ff" stopOpacity={0}/>
                                    </linearGradient>
                                </defs>
                                <Area 
                                    type="monotone" 
                                    dataKey="temperature" 
                                    stroke="#58a6ff" 
                                    strokeWidth={2}
                                    fillOpacity={1} 
                                    fill={`url(#colorTemp-${machine.machine_id})`} 
                                />
                            </AreaChart>
                        </ResponsiveContainer>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mt-2">
                        <div className="bg-gray-800/50 p-3 rounded-lg">
                            <div className="text-[10px] text-gray-400 uppercase">Predicted RUL</div>
                            <div className="text-xl font-bold text-blue-300">{machine.predicted_rul} <span className="text-xs font-normal">Hrs</span></div>
                        </div>
                        <div className="bg-gray-800/50 p-3 rounded-lg">
                            <div className="text-[10px] text-gray-400 uppercase">Risk Level</div>
                            <div className={`text-xl font-bold ${isCritical ? 'text-red-500' : 'text-gray-200'}`}>{machine.risk_level}</div>
                        </div>
                    </div>

                    <div className="flex gap-2 mt-2">
                         <div className="flex-1 flex flex-col">
                            <span className="text-[9px] text-gray-500 uppercase">Vibration</span>
                            <span className="text-sm font-semibold">{machine.telemetry.vibration}</span>
                         </div>
                         <div className="flex-1 flex flex-col">
                            <span className="text-[9px] text-gray-500 uppercase">Pressure</span>
                            <span className="text-sm font-semibold">{machine.telemetry.pressure} psi</span>
                         </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const fetchData = async () => {
                try {
                    const response = await fetch('http://localhost:8000/api/dashboard');
                    if (!response.ok) throw new Error('Backend Offline');
                    const json = await response.json();
                    setData(json);
                    setLoading(false);
                    setError(null);
                } catch (err) {
                    setError('Unable to connect to Factory Floor API');
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 3000); // 3s polling
                return () => clearInterval(interval);
            }, []);

            const avgHealth = useMemo(() => {
                if (data.length === 0) return 0;
                return Math.round(data.reduce((acc, m) => acc + m.health_score, 0) / data.length);
            }, [data]);

            if (loading && data.length === 0) {
                return (
                    <div className="h-screen flex items-center justify-center bg-[#0d1117]">
                        <div className="text-center">
                            <div className="w-16 h-16 border-t-4 border-blue-500 border-solid rounded-full animate-spin mx-auto mb-4"></div>
                            <h2 className="header-font text-xl">Initializing Control Room...</h2>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-8 max-w-[1400px] mx-auto">
                    {/* Top Bar */}
                    <nav className="flex justify-between items-center mb-10 pb-6 border-b border-gray-800">
                        <div>
                            <h1 className="header-font text-3xl font-bold gradient-text">FACTORY HEALTH DASHBOARD</h1>
                            <p className="text-gray-500 text-sm mt-1">AI-Powered Predictive Maintenance System v1.0.4</p>
                        </div>
                        <div className="flex gap-8">
                            <div className="text-center">
                                <div className="text-2xl font-bold header-font text-blue-400">{avgHealth}%</div>
                                <div className="text-[10px] text-gray-400 tracking-widest uppercase">System Stability</div>
                            </div>
                            <div className="text-center">
                                <div className="text-2xl font-bold header-font">0{data.length}</div>
                                <div className="text-[10px] text-gray-400 tracking-widest uppercase">Units Active</div>
                            </div>
                            <div className="flex items-center gap-2 bg-gray-800/50 px-4 py-2 rounded-full border border-gray-700">
                                <div className="w-2 h-2 rounded-full bg-green-500 status-pulse"></div>
                                <span className="text-xs font-semibold">LIVE CONNECTED</span>
                            </div>
                        </div>
                    </nav>

                    {error && (
                        <div className="bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded-lg mb-8 flex items-center gap-2">
                             <span className="font-bold">SYSTEM ERROR:</span> {error}
                        </div>
                    )}

                    {/* Machine Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {data.map(m => (
                            <MachineCard key={m.machine_id} machine={m} />
                        ))}

                        {/* Analysis Panel */}
                        <div className="glass-card p-6 bg-gradient-to-br from-blue-900/10 to-transparent flex flex-col justify-center items-center text-center">
                             <div className="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mb-4">
                                <svg className="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                             </div>
                             <h4 className="header-font text-lg mb-2">Root Cause Analysis</h4>
                             <p className="text-xs text-gray-500 max-w-[200px]">AI detected high vibration correlation on Bearing B across all critical events.</p>
                             <button className="mt-6 bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-colors">
                                 Download Report
                             </button>
                        </div>
                    </div>

                    {/* Footer Stats Toggle */}
                    <div className="mt-12 flex gap-4 overflow-x-auto pb-4">
                        <div className="min-w-[200px] p-4 glass-card">
                             <div className="text-[10px] text-gray-500 uppercase">Downtime Prevention</div>
                             <div className="text-xl font-bold text-green-400">84.2% Success</div>
                        </div>
                        <div className="min-w-[200px] p-4 glass-card">
                             <div className="text-[10px] text-gray-400 uppercase">Total Logged Events</div>
                             <div className="text-xl font-bold">1,204</div>
                        </div>
                        <div className="min-w-[200px] p-4 glass-card">
                             <div className="text-[10px] text-gray-400 uppercase">Avg. Repair Time</div>
                             <div className="text-xl font-bold">4.2 Hrs</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
